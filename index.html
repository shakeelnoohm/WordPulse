<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="dark light">
		<meta name="theme-color" content="#09224A" />
        <meta name="description" content="Free online word counter that counts words, characters, sentences, paragraphs and estimates reading and speaking time.">

		<title>WordPulse – Characters, Words, Reading Time</title>
		<link rel="icon" type="image/x-icon" href="favicon.ico?v=2" />
		<link rel="preload" href="style.css" as="style">
		<link rel="stylesheet" href="style.css" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
		<script defer src="script.js"></script>
	</head>
	<body>
		<div class="container">
		<header>
			<h1>Word Pulse</h1>
		</header>
		<div class="main-wrapper">
			<main>
                <label for="content" class="visually-hidden">Enter text</label>
				<div class="textarea-container">
					<textarea
						id="content"
						name="content"
						rows="18"
						placeholder="Type or paste text here"
					></textarea>
					<button id="clear-text" type="button" aria-label="Clear text">
						<i class="bi bi-eraser"></i>
						Clear
					</button>
					<button id="copy-btn" type="button" aria-label="Copy text">
						<i class="bi bi-clipboard"></i> Copy
					</button>
				</div>
			</main>
			<aside>
				<section class="card">
					<div class="heading">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="24"
							height="24"
							fill="currentColor"
							class="bi bi-card-text"
							viewBox="0 0 16 16"
						>
							<path
								d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"
							/>
							<path
								d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8zm0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"
							/>
						</svg>
						<h3>Counting</h3>
					</div>
					<div class="card-sub">
						<p id="display-characters" class="text-head" aria-live="polite">0</p>
						<p class="text-sub">characters</p>
                    </div>
					<div class="card-sub">
						<p id="display-characters-no-spaces" class="text-head" aria-live="polite">0</p>
						<p class="text-sub">characters no spaces</p>
                    </div>
					<div class="card-sub">
						<p id="display-words" class="text-head" aria-live="polite">0</p>
						<p class="text-sub">words</p>
					</div>
					<div class="card-sub">
						<p id="display-sentences" class="text-head" aria-live="polite">0</p>
						<p class="text-sub">sentences</p>
					</div>
					<div class="card-sub">
						<p id="display-paragraphs" class="text-head" aria-live="polite">0</p>
						<p class="text-sub">paragraphs</p>
					</div>
				</section>
				<section class="card">
					<div class="heading">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="24"
							height="24"
							fill="currentColor"
							class="bi bi-stopwatch"
							viewBox="0 0 16 16"
						>
							<path
								d="M8.5 5.6a.5.5 0 1 0-1 0v2.9h-3a.5.5 0 0 0 0 1H8a.5.5 0 0 0 .5-.5V5.6z"
							/>
							<path
								d="M6.5 1A.5.5 0 0 1 7 .5h2a.5.5 0 0 1 0 1v.57c1.36.196 2.594.78 3.584 1.64a.715.715 0 0 1 .012-.013l.354-.354-.354-.353a.5.5 0 0 1 .707-.708l1.414 1.415a.5.5 0 1 1-.707.707l-.353-.354-.354.354a.512.512 0 0 1-.013.012A7 7 0 1 1 7 2.071V1.5a.5.5 0 0 1-.5-.5zM8 3a6 6 0 1 0 .001 12A6 6 0 0 0 8 3z"
							/>
						</svg>
						<h3>Time</h3>
					</div>
					<section class="card-sub tooltip">
						<p id="display-reading" class="text-head">0</p>
						<p class="text-sub">reading</p>
						<span class="tooltiptext"
							>Based on the average reading speed on 200 WPM</span
						>
					</section>
					<section class="card-sub tooltip">
						<p id="display-speaking" class="text-head">0</p>
						<p class="text-sub">speaking</p>
						<span class="tooltiptext"
							>Based on the average speaking speed on 150 WPM</span
						>
					</section>
				</section>
			</aside>
		</div>
		<footer>
		<p>Created by <strong>Shakeel Nooh M</strong></p>
		</footer>
		</div>
	</body>
</html>
